<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>Barcode Scanner</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: black;
    overflow: hidden;
  }

  video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;

    font-weight: 900;
    color: white;

    background: rgba(0, 200, 0, 0.38);

    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }

  #text {
    font-size: 110px;
    line-height: 1.0;
    letter-spacing: 2px;
  }
</style>
</head>

<body>

<video id="video"></video>

<div id="overlay">
  <div id="text">
    WELKOM<br>AAN BOORD
  </div>
</div>

<!-- JOUW GELUID -->
<audio 
  id="beep" 
  src="scanner-beep.mp3"
  preload="auto">
</audio>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const beep = document.getElementById('beep');

let scanning = true;

// 🔊 Speel jouw eigen scanner sound af
function playScannerBeep() {
  beep.currentTime = 0;
  beep.play();
}

function showWelcome() {
  overlay.style.opacity = 1;

  // geluid + trilling
  playScannerBeep();

  if (navigator.vibrate) {
    navigator.vibrate([80, 50, 80]);
  }

  scanning = false;

  setTimeout(() => {
    overlay.style.opacity = 0;
    scanning = true;
  }, 2000);
}

const codeReader = new ZXing.BrowserMultiFormatReader();

codeReader.listVideoInputDevices()
  .then((devices) => {

    // achtercamera pakken indien mogelijk
    const backCamera = devices.find(device =>
      device.label.toLowerCase().includes('back')
    );

    const deviceId = backCamera
      ? backCamera.deviceId
      : devices[0].deviceId;

    codeReader.decodeFromVideoDevice(
      deviceId,
      video,
      (result, err) => {

        if (result && scanning) {
          console.log(result.getText());
          showWelcome();
        }

      }
    );
  });
</script>

</body>
</html>
